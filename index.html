<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lead Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
.card { background: #fff; padding: 10px; margin: 10px 0; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.1);}
button { margin: 5px; padding: 5px 10px; cursor: pointer; }
</style>
</head>
<body>

<h1>Lead Dashboard</h1>
<div>
  <button onclick="filterNiche('real_estate')">Real Estate</button>
  <button onclick="filterNiche('web_dev')">Web Dev</button>
  <button onclick="filterNiche('education')">Education</button>
  <button onclick="loadLeads()">All</button>
</div>

<div id="leads"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabase = supabase.createClient(
  "https://ibyijnskioqtyvtflocr.supabase.co",
  "sb_publishable__8UDz84D_7v9GqgTRP9CiA_RA_Aj87g"
);

async function loadLeads() {
  const { data } = await supabase.from("leads").select("*").order("created_at", { ascending: false });
  displayLeads(data);
}

async function filterNiche(niche) {
  const { data } = await supabase.from("leads").select("*").eq("niche", niche).order("created_at", { ascending: false });
  displayLeads(data);
}

function displayLeads(data) {
  const container = document.getElementById("leads");
  container.innerHTML = data.map(lead => `
    <div class="card">
      <h3>${lead.title}</h3>
      <p>${lead.description}</p>
      <small>Niche: ${lead.niche} | Score: ${lead.score} | Status: ${lead.status}</small><br>
      <a href="${lead.link}" target="_blank">View</a>
    </div>
  `).join("");
}

loadLeads();
</script>

</body>
</html>
